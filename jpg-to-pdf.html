<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JPG to PDF</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<header class="header">
<h2 class="logo">💖 Hridoy PDF</h2>
</header>

<section class="hero">
<h1>JPG to PDF</h1>
<p>Upload images and convert</p>
</section>

<div class="tool-container">

<div id="dropArea" class="upload-box">
<p>Click or Drag Images</p>
</div>

<input type="file" id="imageInput" multiple accept="image/*">

<button onclick="clearAll()" class="convert-btn">Clear All</button>

<div id="preview"></div>

<button id="convertBtn" class="convert-btn">
Convert to PDF
</button>

</div>

<script src="script.js"></script>

</body>
</html>
