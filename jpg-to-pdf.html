<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JPG to PDF - Hridoy PDF Tools</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<section class="hero">
<h1>📄 JPG to PDF Tool</h1>
<p>Upload multiple images, reorder, delete and convert easily</p>
</section>

<div class="tool-container">

<!-- DRAG AREA -->
<div id="dropArea" class="upload-box">
<i class="fa-solid fa-cloud-arrow-up"></i>
<p>Click or Drag Images Here</p>
</div>

<input type="file" id="imageInput" multiple accept="image/*" hidden>

<!-- PREVIEW -->
<div id="preview"></div>

<button id="convertBtn" class="convert-btn">
🚀 Convert to PDF
</button>

</div>

<script src="script.js"></script>

</body>
</html>
